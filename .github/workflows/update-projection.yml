name: Monthly projection update

on:
  schedule:
    # Runs monthly on the 1st at 8am UTC.
    # FMP (stocks, mortgage) always succeeds.
    # FRED groups (FHFA, S&P CS, BLS rent) are skipped silently when prior-year
    # data isn't published yet (Jan–Feb); they land automatically once available
    # (~March) without any retry logic or manual intervention.
    - cron: "0 8 3 * *"
  workflow_dispatch: # manual trigger if needed

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update projection data from FMP + FRED
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          DATE=$(date +%Y-%m)
          python3 scripts/update_projection.py "$DATE"

      - name: Verify JS syntax
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const scripts = html.match(/<script>([\s\S]*?)<\/script>/g) || [];
            scripts.forEach((s, i) => {
              try { new Function(s.replace(/<\/?script>/g, '')); }
              catch(e) { console.error('JS error block', i, ':', e.message); process.exit(1); }
            });
            console.log('JS OK');
          "

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.js
          if git diff --staged --quiet; then
            echo "No changes — projection data unchanged."
          else
            git commit -m "chore: monthly projection update $(date +%Y-%m) [skip ci]"
            git push
          fi
