name: Monthly projection update

on:
  schedule:
    # Runs every Monday at 8am UTC (weekly retry cadence).
    # FMP (stocks, mortgage) always updates.
    # FRED groups (FHFA, S&P CS, BLS rent) are skipped silently when prior-year
    # data isn't published yet; they are picked up automatically once available
    # (~late Feb for Dec data) — typically within 7 days instead of 30.
    # workflow_dispatch allows on-demand runs without waiting for the next Monday.
    - cron: "0 8 * * 1"
  workflow_dispatch: # manual trigger at any time

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update projection data from FMP + FRED
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          DATE=$(date +%Y-%m)
          python3 scripts/update_projection.py "$DATE"

      - name: Verify JS syntax
        run: |
          node -e "
            const fs = require('fs');
            // Check data.js (primary patch target)
            try { new Function(fs.readFileSync('data.js', 'utf8')); }
            catch(e) { console.error('data.js error:', e.message); process.exit(1); }
            // Check inline <script> blocks in index.html
            const html = fs.readFileSync('index.html', 'utf8');
            const scripts = html.match(/<script>([\s\S]*?)<\/script>/g) || [];
            scripts.forEach((s, i) => {
              try { new Function(s.replace(/<\/?script>/g, '')); }
              catch(e) { console.error('index.html block', i, ':', e.message); process.exit(1); }
            });
            console.log('JS OK');
          "

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.js
          if git diff --staged --quiet; then
            echo "No changes — data unchanged this week."
          else
            git commit -m "chore: projection update $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
