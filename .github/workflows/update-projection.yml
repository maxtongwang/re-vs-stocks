name: Monthly projection update

on:
  schedule:
    # FHFA Q4 and S&P CS HPI Dec are published ~Feb 25 each year.
    # Firing from March 1 ensures all prior-year data is available.
    # Jan 1 / Feb 1 skipped — FHFA/CS not yet published, would always fail.
    # Monthly Mar–Dec: 10 runs/year, 0 expected retries.
    - cron: "0 8 1 3-12 *"
  workflow_dispatch: # manual trigger for Jan/Feb or emergency reruns

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update projection data from FMP + FRED
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          DATE=$(date +%Y-%m)
          python3 scripts/update_projection.py "$DATE"

      - name: Verify JS syntax
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const scripts = html.match(/<script>([\s\S]*?)<\/script>/g) || [];
            scripts.forEach((s, i) => {
              try { new Function(s.replace(/<\/?script>/g, '')); }
              catch(e) { console.error('JS error block', i, ':', e.message); process.exit(1); }
            });
            console.log('JS OK');
          "

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.js
          if git diff --staged --quiet; then
            echo "No changes — projection data unchanged."
          else
            git commit -m "chore: monthly projection update $(date +%Y-%m) [skip ci]"
            git push
          fi
