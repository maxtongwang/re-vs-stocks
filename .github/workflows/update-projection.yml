name: Monthly projection update

on:
  schedule:
    # 3rd of month at 8am UTC — catches Case-Shiller (last Tue) + FHFA (quarterly)
    # 17th of month at 8am UTC — catches BLS CPI rent (~10th–14th)
    - cron: "0 8 3 * *"
    - cron: "0 8 17 * *"
  workflow_dispatch: # manual trigger at any time

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Update projection data from FMP + FRED
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          DATE=$(date +%Y-%m)
          python3 scripts/update_projection.py "$DATE"

      - name: Verify JS syntax
        run: |
          node -e "
            const fs = require('fs');
            try { new Function(fs.readFileSync('data.js', 'utf8')); }
            catch(e) { console.error('data.js error:', e.message); process.exit(1); }
            const html = fs.readFileSync('index.html', 'utf8');
            const scripts = html.match(/<script>([\s\S]*?)<\/script>/g) || [];
            scripts.forEach((s, i) => {
              try { new Function(s.replace(/<\/?script>/g, '')); }
              catch(e) { console.error('index.html block', i, ':', e.message); process.exit(1); }
            });
            console.log('JS OK');
          "

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s|<lastmod>.*</lastmod>|<lastmod>$TODAY</lastmod>|g" sitemap.xml

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.js sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes — data unchanged this run."
            exit 0
          fi

          BRANCH="data/update-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git commit -m "chore: projection update $(date +%Y-%m-%d)"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: projection update $(date +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
          Automated data refresh from FMP + FRED.

          - S&P 500, NASDAQ, TLT: current-year YTD + prior-year annual (FMP)
          - Mortgage rate: 10yr Treasury + 180bps spread (FMP)
          - House prices: FHFA HPI + S&P Case-Shiller — annual + YTD annualized (FRED)
          - Rent growth: BLS CPI — annual + YTD annualized (FRED)

          Auto-merge enabled — will merge when CI passes.
          EOF
          )" \
            --base main \
            --head "$BRANCH"

          gh pr merge "$BRANCH" --auto --squash --delete-branch
